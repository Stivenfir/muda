services:
  mysql:
    image: mysql:8.0
    container_name: abcmudanzas_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-abcmudanzas}
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app123}
    ports:
      - "${MYSQL_HOST_PORT:-3308}:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: abcmudanzas_backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    container_name: abcmudanzas_frontend
    ports:
      - "4173:4173"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend

volumes:
  mysql_data:
